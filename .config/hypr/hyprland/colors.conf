general {
    col.active_border = rgba(7b7677AA)
    col.inactive_border = rgba(cbc5c6AA)
}

misc {
    background_color = rgba(151314FF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(fff8f8FF)
        col.text = rgba(1e1b1cFF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(1e1b1c), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(1e1b1c), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(1e1b1c), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrulev2 = bordercolor rgba(6d5962AA) rgba(6d596277),pinned:1
